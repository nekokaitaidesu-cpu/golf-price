name: refresh
# 1日8回(2/10/12/14/16/18/20/22時 JST)に全機種の価格を取得→スマホサイト更新。
# ★前日比の基準(history.db)は「2:00の回だけ」記録する（--record-history）。
#   10:00〜22:00の回は価格・サイトを更新するが履歴には触れない＝前日比の基準は2:00のまま不動。
# PCの電源に依存しないクラウド実行。history.db は data ブランチで永続化。
on:
  schedule:
    - cron: "0 17 * * *"     # 02:00 JST ★基準（履歴を記録する回）
    - cron: "0 1 * * *"      # 10:00 JST
    - cron: "0 3 * * *"      # 12:00 JST
    - cron: "0 5 * * *"      # 14:00 JST
    - cron: "0 7 * * *"      # 16:00 JST
    - cron: "0 9 * * *"      # 18:00 JST
    - cron: "0 11 * * *"     # 20:00 JST
    - cron: "0 13 * * *"     # 22:00 JST
  workflow_dispatch:
    inputs:
      limit:
        description: "テスト用: 先頭N機種だけ実行（空=全機種）"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    # クラウド実行の時刻表記を日本時間に固定（_fetched_at がUTCで記録され、
    # ヘッダーの取得時刻が9時間ズレて「古い時刻に戻った」ように見えるのを防ぐ）。
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4 cryptography

      - name: restore data branch (.cache + history.db)
        # .cache も復元しないと、最後の永続化(force-push)で popularity.json など
        # 他ワークフローが置いたキャッシュを data ブランチから消してしまう
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch origin data --depth 1
            git checkout origin/data -- history.db && echo "history.db 復元" || echo "history.db なし"
            git checkout origin/data -- .cache && echo ".cache 復元" || echo ".cache なし"
            git reset -q
          else
            echo "data ブランチ未作成（初回）"
          fi

      - name: run refresh
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          MODEL_LIMIT: ${{ github.event.inputs.limit }}
          # 2:00 の回(cron 0 17)だけ履歴を記録＝前日比の基準。それ以外は記録しない。
          IS_BASELINE: ${{ github.event.schedule == '0 17 * * *' }}
        run: |
          if [ "$IS_BASELINE" = "true" ]; then
            echo "★基準回: 履歴を記録します(--record-history)"
            python refresh_rankings.py --record-history
          else
            echo "通常回: 価格のみ更新（履歴は2:00のまま）"
            python refresh_rankings.py
          fi

      - name: publish site -> golf-price-mobile
        if: ${{ github.event.inputs.limit == '' }}   # 全機種のときだけ本番サイトを更新
        env:
          DEPLOY_KEY: ${{ secrets.MOBILE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            git clone --depth 1 git@github.com:nekokaitaidesu-cpu/golf-price-mobile.git mobilepush
          cp -f site/data.json mobilepush/data.json
          cp -f site/index.html mobilepush/index.html
          cd mobilepush
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -q -m "update $(date -u +'%Y-%m-%d %H:%M')UTC"
            GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" git push
          fi

      - name: persist history.db + .cache (data ブランチ)
        if: ${{ github.event.inputs.limit == '' }}   # 全機種のときだけ永続化（テスト実行では上書きしない）
        run: |
          # 安全策: history.db が空/欠損なら前日比の基準を壊さないため永続化を中止
          if [ ! -s history.db ]; then
            echo "history.db が空/無し → 永続化スキップ（基準を保護）"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q --orphan data-tmp
          git reset -q
          git add -f history.db .cache
          git commit -q -m "data $(date -u +'%Y-%m-%d %H:%M')UTC"
          git push -f origin data-tmp:data
